<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>POS Pro</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1220;
        color: #e5e7eb;
      }
      .card {
        width: min(560px, 92vw);
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(17, 24, 39, 0.6);
        border-radius: 16px;
        padding: 20px;
      }
      .title {
        font-weight: 700;
        font-size: 18px;
        margin: 0 0 6px 0;
      }
      .muted {
        margin: 0;
        color: #cbd5e1;
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <p class="title">POS Pro</p>
        <p class="muted">Memuat aplikasi…</p>
        <p class="muted">Jika aplikasi tidak tampil, pastikan perangkat terhubung ke internet.</p>
      </div>
    </div>
  </body>
</html>
